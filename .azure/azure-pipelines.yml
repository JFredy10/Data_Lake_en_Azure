trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: azure-terraform-secrets
  # El grupo de variables debe contener:
  # ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID

stages:
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    jobs:
      - job: Plan
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - script: |
              terraform init \
                -backend-config="resource_group_name=$(BACKEND_RG)" \
                -backend-config="storage_account_name=$(BACKEND_SA)" \
                -backend-config="container_name=$(BACKEND_CONTAINER)" \
                -backend-config="key=dataplatform.tfstate"
            workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
            displayName: 'Terraform Init'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform plan -out=tfplan
            workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
            displayName: 'Terraform Plan'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/infrastructure/tfplan'
              artifact: 'terraform-plan'
              publishLocation: 'pipeline'

  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - deployment: Apply
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    buildType: 'current'
                    artifactName: 'terraform-plan'
                    targetPath: '$(System.DefaultWorkingDirectory)/infrastructure'

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: 'latest'

                - script: |
                    terraform init \
                      -backend-config="resource_group_name=$(BACKEND_RG)" \
                      -backend-config="storage_account_name=$(BACKEND_SA)" \
                      -backend-config="container_name=$(BACKEND_CONTAINER)" \
                      -backend-config="key=dataplatform.tfstate"
                  workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
                  displayName: 'Terraform Init (Apply)'
                  env:
                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                    ARM_TENANT_ID: $(ARM_TENANT_ID)

                - script: |
                    terraform apply -auto-approve tfplan
                  workingDirectory: '$(System.DefaultWorkingDirectory)/infrastructure'
                  displayName: 'Terraform Apply'
                  env:
                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                    ARM_TENANT_ID: $(ARM_TENANT_ID)
